<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/vite.svg" />
  <link rel="manifest" href="/manifest.json" />
  <meta name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, interactive-widget=resizes-content" />
  <title>August 3.5</title>
  <!-- TODO: Replace Tailwind CDN with build-time Tailwind CSS for production -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap"
    rel="stylesheet">

  <style>
    body {
      font-family: 'Inter', sans-serif;
      touch-action: manipulation;
      /* Improves tap delay on mobile */
      -webkit-tap-highlight-color: transparent;
      overscroll-behavior-y: none;
      /* Prevents pull-to-refresh on mobile */
    }

    pre,
    code,
    .font-mono {
      font-family: 'JetBrains Mono', monospace;
    }

    /* Modern Scrollbar */
    ::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background: #3f3f46;
      /* zinc-700 */
      border-radius: 10px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: #52525b;
      /* zinc-600 */
    }

    /* Animations */
    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .animate-fade-in {
      animation: fadeIn 0.3s ease-out forwards;
    }

    @keyframes slideInRight {
      from {
        transform: translateX(100%);
      }

      to {
        transform: translateX(0);
      }
    }

    @keyframes slideDown {
      from {
        opacity: 0;
        transform: translate(-50%, -20px);
      }

      to {
        opacity: 1;
        transform: translate(-50%, 0);
      }
    }

    .animate-slide-down {
      animation: slideDown 0.4s ease-out forwards;
    }

    @keyframes slideInLeft {
      from {
        transform: translateX(-100%);
      }

      to {
        transform: translateX(0);
      }
    }

    .animate-slide-in-left {
      animation: slideInLeft 0.3s ease-out forwards;
    }

    /* Slide up animation for mobile bottom sheet */
    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(100%);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .animate-slide-up {
      animation: slideUp 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    /* Slide left animation for desktop panel */
    @keyframes slideLeft {
      from {
        opacity: 0;
        transform: translateX(100%);
      }

      to {
        opacity: 1;
        transform: translateX(0);
      }
    }

    .animate-slide-left {
      animation: slideLeft 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    /* Hide scrollbar utility */
    .scrollbar-hide {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }

    .scrollbar-hide::-webkit-scrollbar {
      display: none;
    }

    @keyframes slideInRight {
      from {
        opacity: 0;
        transform: translateX(100%);
      }

      to {
        opacity: 1;
        transform: translateX(0);
      }
    }

    .animate-slide-in-right {
      animation: slideInRight 0.3s ease-out forwards;
    }

    .collapsible-content {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .collapsible-content.expanded {
      max-height: 30000px;
    }

    /* Glassmorphism utilities - Optimized for Mobile Performance */
    .glass {
      background: rgba(24, 24, 27, 0.95);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border: 1px solid rgba(255, 255, 255, 0.08);
    }

    /* Reduce blur on mobile to save GPU */
    @media (max-width: 640px) {
      .glass {
        background: #18181b;
        /* zinc-900 fallback */
        backdrop-filter: none !important;
        -webkit-backdrop-filter: none !important;
        border-bottom: 1px solid #27272a;
      }

      /* Globally disable backdrop-filter on mobile for performance */
      * {
        backdrop-filter: none !important;
        -webkit-backdrop-filter: none !important;
      }

      .glass-panel {
        background: #18181b !important;
        border: 1px solid #27272a !important;
      }

      /* Disable heavy box-shadows on mobile */
      .shadow-2xl,
      .shadow-xl,
      .shadow-lg {
        box-shadow: none !important;
        border: 1px solid #27272a;
      }
    }

    .glass-panel {
      background: rgba(9, 9, 11, 0.8);
      backdrop-filter: blur(6px);
      border: 1px solid rgba(255, 255, 255, 0.05);
    }

    /* Mobile specific viewport fix */
    .h-dvh {
      height: 100vh;
      height: 100dvh;
    }

    html,
    body,
    #root {
      height: 100%;
      width: 100%;
      overflow: hidden;
      background-color: #09090b;
      /* zinc-950 matches app theme to prevent white flashes */
    }

    /* ===== ACCESSIBILITY IMPROVEMENTS ===== */

    /* Focus visible styles for keyboard navigation */
    :focus-visible {
      outline: 2px solid #06b6d4;
      outline-offset: 2px;
    }

    /* Reduced motion for users who prefer it */
    @media (prefers-reduced-motion: reduce) {

      *,
      *::before,
      *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
      }
    }

    /* Skip to main content link (screen readers) */
    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    /* ===== ENHANCED MOBILE TOUCH ===== */

    /* Minimum touch target size (44x44px recommended by WCAG) */
    @media (max-width: 640px) {

      button,
      a,
      [role="button"] {
        min-height: 44px;
        min-width: 44px;
      }

      /* Better touch feedback */
      button:active,
      a:active,
      [role="button"]:active {
        transform: scale(0.97);
        opacity: 0.9;
      }

      /* Easier to tap inputs */
      input,
      textarea,
      select {
        font-size: 16px !important;
        /* Prevents zoom on iOS */
        min-height: 44px;
      }

      /* Improve scrolling */
      .scroll-container {
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
      }
    }

    /* High contrast mode support */
    @media (prefers-contrast: high) {

      /* Target elements with low-contrast borders */
      [class*="border-white"] {
        border-color: rgba(255, 255, 255, 0.5) !important;
      }

      /* Improve text contrast */
      [class*="text-zinc-4"],
      [class*="text-zinc-5"] {
        color: #a1a1aa !important;
      }
    }

    /* ===== MOBILE SCROLLING UTILITIES ===== */

    /* Hide scrollbar but keep scroll functionality */
    .no-scrollbar {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }

    .no-scrollbar::-webkit-scrollbar {
      display: none;
    }

    /* Custom thin scrollbar for content areas */
    .custom-scrollbar {
      scrollbar-width: thin;
      scrollbar-color: #3f3f46 transparent;
    }

    .custom-scrollbar::-webkit-scrollbar {
      width: 4px;
      height: 4px;
    }

    .custom-scrollbar::-webkit-scrollbar-track {
      background: transparent;
    }

    .custom-scrollbar::-webkit-scrollbar-thumb {
      background: #3f3f46;
      border-radius: 4px;
    }

    /* Mobile touch scroll optimization */
    @media (max-width: 640px) {
      .custom-scrollbar::-webkit-scrollbar {
        width: 2px;
        height: 2px;
      }
    }
  </style>

</head>

<body class="bg-zinc-950 text-zinc-100 antialiased overflow-hidden">

</body>

</html>
